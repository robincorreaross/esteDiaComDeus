name: Este Dia Com Deus - Bot Diário

on:
  schedule:
    # 9h UTC = 5h horário de Brasília (BRT, UTC-3)
    - cron: '7 8 * * *' # 08:07 UTC = 05:07 Horário de Brasília (BRT, UTC-3)
  workflow_dispatch: # Permite rodar manualmente pela aba Actions do GitHub

jobs:
  run-bot:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Executar automação
        env:
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          YOUTUBE_CHANNEL_HANDLE: EsteDiacomDeus
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4o-mini
          EVOLUTION_API_URL: ${{ secrets.EVOLUTION_API_URL }}
          EVOLUTION_API_KEY: ${{ secrets.EVOLUTION_API_KEY }}
          EVOLUTION_INSTANCE: ${{ secrets.EVOLUTION_INSTANCE }}
          TIMEZONE: America/Sao_Paulo
          # Edite aqui para adicionar ou remover destinatarios (virgula ou ponto-e-virgula)
          # Formato: numero com DDI (5511...) ou grupo (@g.us)
          WHATSAPP_TARGETS: "5516991080895;5516993024235;120363043962750423@g.us;5516991080895-1519304287@g.us"
        run: npm run now
